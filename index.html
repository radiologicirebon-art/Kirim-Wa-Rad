<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiologi WA System Premium</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family: 'Segoe UI', sans-serif;
}
.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 20px;
}
.fade { animation: fadeIn 0.5s ease; }
@keyframes fadeIn {
    from {opacity:0; transform:translateY(15px);}
    to {opacity:1;}
}
.btn {
    transition: 0.3s;
}
.btn:hover {
    transform: scale(1.05);
}
</style>
</head>

<body class="text-white p-6">

<h1 class="text-3xl font-bold text-center mb-6 fade">
📡 Radiologi WhatsApp System
</h1>

<!-- FORM -->
<div class="glass p-6 max-w-xl mx-auto fade">

<h2 class="text-xl mb-4">Input Pasien</h2>

<input id="nama" placeholder="Nama Pasien" class="input">
<input id="rm" placeholder="No RM" class="input">
<input id="wa" placeholder="08xxxxxxxxxx" class="input">
<input id="pemilik" placeholder="Nama Pemilik" class="input">
<input id="tgl" type="date" class="input">

<button onclick="simpan()" class="btn bg-green-500 w-full p-2 rounded mt-3">
Simpan Data
</button>

</div>

<!-- LOGIN -->
<div class="text-center mt-6">
<button onclick="login()" class="underline">LOGIN ADMIN</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden mt-10 fade">

<div class="grid grid-cols-3 gap-4 mb-6 text-center">

<div class="glass p-4">
<h3>Total</h3>
<p id="total">0</p>
</div>

<div class="glass p-4">
<h3>Belum</h3>
<p id="belumCount">0</p>
</div>

<div class="glass p-4">
<h3>Sudah</h3>
<p id="sudahCount">0</p>
</div>

</div>

<!-- BELUM -->
<h2 class="text-xl mb-2">Belum Kirim</h2>
<table class="w-full bg-white text-black rounded mb-6">
<tbody id="belum"></tbody>
</table>

<!-- SUDAH -->
<h2 class="text-xl mb-2">Sudah Kirim</h2>
<table class="w-full bg-white text-black rounded">
<tbody id="sudah"></tbody>
</table>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
databaseURL: "https://kirim-wa-pasien-rad-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== ADMIN LIST =====
const adminList = {
"201708073": {pass:"123", nama:"Ino Hadiwinata"},
"202101209": {pass:"123", nama:"Ardi Pratama"},
"202207105": {pass:"123", nama:"Zhafira"},
"202303119": {pass:"123", nama:"Dwi Alfi"},
"202310276": {pass:"123", nama:"Rita Riana"},
"202403156": {pass:"123", nama:"Rizky"},
"202411359": {pass:"123", nama:"Rafi"},
"202502147": {pass:"123", nama:"Dias"},
"202507169": {pass:"123", nama:"Taufik"},
"202508171": {pass:"123", nama:"Arief"},
"202508172": {pass:"123", nama:"Salsa"}
};

let currentUser = "";

// ===== INPUT STYLE =====
document.querySelectorAll(".input").forEach(e=>{
e.className="w-full p-2 mb-2 rounded text-black";
});

// ===== SIMPAN =====
function simpan() {
let data = {
nama: nama.value,
rm: rm.value,
wa: wa.value,
pemilik: pemilik.value,
tgl: tgl.value,
status: "belum",
created: Date.now()
};

db.ref("pasien").push(data);
alert("Data berhasil disimpan");
location.reload();
}

// ===== LOGIN =====
function login() {
let u = prompt("Username");
let p = prompt("Password");

if(adminList[u] && adminList[u].pass === p) {
currentUser = adminList[u].nama;
dashboard.classList.remove("hidden");
load();
} else {
alert("Login gagal");
}
}

// ===== LOAD DATA =====
function load() {
db.ref("pasien").on("value", snap=>{

let total=0, belum=0, sudah=0;
let htmlBelum="", htmlSudah="";

snap.forEach(d=>{

let data=d.val();
total++;

if(data.status=="belum"){
belum++;

htmlBelum+=`
<tr>
<td>${data.nama}</td>
<td>${data.wa}</td>
<td>
<button onclick="kirim('${d.key}','${data.nama}','${data.wa}')"
class="btn bg-green-500 text-white px-2 py-1 rounded">
Kirim WA
</button>
</td>
</tr>`;
}
else{
sudah++;

htmlSudah+=`
<tr>
<td>${data.nama}</td>
<td>${data.wa}</td>
<td>${data.tglKirim || "-"}</td>
<td>${data.user || "-"}</td>
</tr>`;
}

});

document.getElementById("total").innerText=total;
document.getElementById("belumCount").innerText=belum;
document.getElementById("sudahCount").innerText=sudah;

document.getElementById("belum").innerHTML=htmlBelum;
document.getElementById("sudah").innerHTML=htmlSudah;

});
}

// ===== KIRIM WA =====
function kirim(id,nama,wa){

let pesan=`Halo Sahabat MP,

Berikut hasil pemeriksaan radiologi atas nama ${nama}.

Silakan download aplikasi:
https://play.google.com/store/apps/details?id=com.mphg.mp_healthcare`;

window.open(`https://wa.me/${wa}?text=${encodeURIComponent(pesan)}`);

db.ref("pasien/"+id).update({
status:"sudah",
tglKirim:new Date().toLocaleString(),
user: currentUser
});
}

</script>

</body>
</html>
