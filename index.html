<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiologi WA</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:linear-gradient(135deg,#f4f9fb,#eaf6fb);
font-family:'Segoe UI';
}

.card{
background:#fff;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #e5e7eb;
}

.input:focus{
border-color:#4bb7db;
box-shadow:0 0 0 2px rgba(75,183,219,0.2);
}

.btn{
background:#4bb7db;
color:#fff;
padding:12px;
border-radius:10px;
font-weight:600;
}

.btn:hover{
background:#36a6cb;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#4bb7db;
color:#fff;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body class="p-6">

<h1 class="text-2xl font-bold text-center text-[#4bb7db] mb-6">
📡 Validasi WA Radiologi
</h1>

<!-- FORM -->
<div class="card p-6 max-w-lg mx-auto">

<input id="nama" placeholder="Nama Pasien" class="input">
<input id="rm" placeholder="No RM" class="input">
<input id="wa" placeholder="Nomor WA (08xxx)" class="input">

<p class="text-sm mt-2 mb-1">Tanda Tangan Persetujuan:</p>
<canvas id="ttd" width="320" height="120" class="border rounded"></canvas>

<button onclick="clearTTD()" class="text-red-500 text-sm mt-2">
Clear
</button>

<button onclick="simpan()" class="btn w-full mt-4">
Simpan Permohonan
</button>

</div>

<!-- DATA -->
<div class="mt-10 max-w-4xl mx-auto">

<h2 class="font-semibold text-[#4bb7db] mb-2">Keranjang Belum Kirim</h2>
<table class="mb-6">
<thead>
<tr>
<th>No</th>
<th>Nama Pasien</th>
<th>No RM</th>
<th>Kirim WA</th>
</tr>
</thead>
<tbody id="belum"></tbody>
</table>

<h2 class="font-semibold text-[#4bb7db] mb-2">Keranjang Terkirim</h2>
<table>
<thead>
<tr>
<th>No</th>
<th>Nama Pasien</th>
<th>No RM</th>
<th>Tanggal Kirim</th>
</tr>
</thead>
<tbody id="sudah"></tbody>
</table>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// FIREBASE
firebase.initializeApp({
databaseURL:"https://kirim-wa-pasien-rad-default-rtdb.asia-southeast1.firebasedatabase.app/"
});
const db=firebase.database();

// CANVAS
let canvas=document.getElementById("ttd");
let ctx=canvas.getContext("2d");
let drawing=false;
let isSigned=false;

ctx.lineWidth=2;
ctx.lineCap="round";

canvas.addEventListener("mousedown",(e)=>{
drawing=true; isSigned=true;
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
});

canvas.addEventListener("mouseup",()=>drawing=false);

canvas.addEventListener("mousemove",(e)=>{
if(!drawing) return;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
});

// CLEAR
function clearTTD(){
ctx.clearRect(0,0,canvas.width,canvas.height);
isSigned=false;
}

// SIMPAN
function simpan(){

if(!isSigned){
alert("Tanda tangan wajib!");
return;
}

let data={
nama:nama.value,
rm:rm.value,
wa:formatWA(wa.value),
ttd:canvas.toDataURL(),
status:"belum"
};

db.ref("pasien").push(data);

alert("Data tersimpan");
location.reload();
}

// LOAD
db.ref("pasien").on("value",snap=>{

let belumHTML="", sudahHTML="";
let no1=1,no2=1;

snap.forEach(d=>{
let x=d.val();

if(x.status=="belum"){
belumHTML+=`
<tr>
<td>${no1++}</td>
<td>${x.nama}</td>
<td>${x.rm}</td>
<td>
<button onclick="kirim('${d.key}','${x.nama}','${x.wa}')" class="btn px-2 py-1 text-sm">
Kirim
</button>
</td>
</tr>`;
}else{
sudahHTML+=`
<tr>
<td>${no2++}</td>
<td>${x.nama}</td>
<td>${x.rm}</td>
<td>${x.tglKirim}</td>
</tr>`;
}
});

belum.innerHTML=belumHTML;
sudah.innerHTML=sudahHTML;

});

// KIRIM WA
function kirim(id,nama,wa){

let pesan=`Halo,

Berikut hasil pemeriksaan ${nama} di Instalasi Radiologi.`;

window.open(`https://wa.me/${wa}?text=${encodeURIComponent(pesan)}`);

db.ref("pasien/"+id).update({
status:"sudah",
tglKirim:new Date().toLocaleString()
});
}

// FORMAT WA
function formatWA(n){
if(n.startsWith("08")) return "62"+n.substring(1);
return n;
}

</script>

</body>
</html>
