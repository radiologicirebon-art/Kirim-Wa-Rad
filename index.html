<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radiologi WA Premium</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#f4f9fb;
font-family:'Segoe UI';
}

/* CARD */
.card{
background:#fcfcfc;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* INPUT */
.input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #dbeafe;
background:#f8fafc;
outline:none;
}

.input:focus{
border-color:#4bb7db;
box-shadow:0 0 0 2px rgba(75,183,219,0.2);
}

/* BUTTON */
.btn{
background:#4bb7db;
color:#fff;
padding:10px;
border-radius:10px;
font-weight:600;
transition:0.2s;
}

.btn:hover{
background:#36a6cb;
}

/* CANVAS */
canvas{
background:#fff;
border:1px solid #e5e7eb;
border-radius:10px;
touch-action:none;
}

/* TABLE */
.table{
width:100%;
background:#fff;
border-radius:12px;
overflow:hidden;
}

.table td{
padding:8px;
border-bottom:1px solid #eee;
}
</style>

</head>

<body class="p-5 text-gray-700">

<h1 class="text-2xl text-center font-bold mb-6 text-[#4bb7db]">
📡 Validasi WhatsApp Radiologi
</h1>

<div class="card p-6 max-w-xl mx-auto">

<input id="nama" placeholder="Nama Pasien" class="input">
<input id="rm" placeholder="No RM" class="input">
<input id="wa" placeholder="08xxxxxxxxxx" class="input">
<input id="pemilik" placeholder="Nama Pemilik" class="input">
<input id="tgl" type="date" class="input">

<p class="text-sm text-gray-500 mt-2">
Saya menyetujui pengiriman hasil radiologi via WhatsApp
</p>

<p class="mt-3 text-sm font-semibold text-gray-600">Tanda Tangan:</p>
<canvas id="ttd" width="300" height="120"></canvas>

<div class="flex gap-2 mt-2">
<button onclick="clearTTD()" class="bg-red-500 text-white px-3 py-1 rounded">
Clear
</button>
</div>

<button onclick="simpan()" class="btn w-full mt-4">
SIMPAN
</button>

</div>

<div class="text-center mt-5">
<button onclick="login()" class="text-[#4bb7db] underline">
LOGIN ADMIN
</button>
</div>

<div id="admin" class="hidden mt-8 max-w-4xl mx-auto">

<div class="flex gap-2 mb-4">
<input type="date" id="filterTgl" class="input">
<button onclick="filter()" class="btn px-3">Filter</button>
<button onclick="exportExcel()" class="bg-green-500 text-white px-3 rounded">Export</button>
</div>

<h2 class="mb-2 font-semibold text-[#4bb7db]">Belum Kirim</h2>
<table class="table mb-5">
<tbody id="belum"></tbody>
</table>

<h2 class="mb-2 font-semibold text-[#4bb7db]">Sudah Kirim</h2>
<table class="table">
<tbody id="sudah"></tbody>
</table>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// FIREBASE
const firebaseConfig={
databaseURL:"https://kirim-wa-pasien-rad-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// ADMIN
const adminList={
"201708073":{p:"123",n:"Ino"},
"202101209":{p:"123",n:"Ardi"},
"202207105":{p:"123",n:"Zhafira"},
"202303119":{p:"123",n:"Dwi"}
};

let userLogin="";

// ===== TTD FIX =====
let canvas=document.getElementById("ttd");
let ctx=canvas.getContext("2d");
let drawing=false;
let isSigned=false; // ✅ FLAG

// STYLE TINTA
ctx.strokeStyle = "#1f2937";
ctx.lineWidth = 2.5;
ctx.lineCap = "round";

// DESKTOP
canvas.addEventListener("mousedown",(e)=>{
drawing=true;
isSigned=true;
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
});

canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mouseleave",()=>drawing=false);

canvas.addEventListener("mousemove",(e)=>{
if(!drawing) return;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
});

// MOBILE
canvas.addEventListener("touchstart",(e)=>{
e.preventDefault();
drawing=true;
isSigned=true;
let rect=canvas.getBoundingClientRect();
let t=e.touches[0];
ctx.beginPath();
ctx.moveTo(t.clientX-rect.left, t.clientY-rect.top);
});

canvas.addEventListener("touchend",()=>drawing=false);

canvas.addEventListener("touchmove",(e)=>{
e.preventDefault();
if(!drawing) return;
let rect=canvas.getBoundingClientRect();
let t=e.touches[0];
ctx.lineTo(t.clientX-rect.left, t.clientY-rect.top);
ctx.stroke();
});

// CLEAR
function clearTTD(){
ctx.clearRect(0,0,canvas.width,canvas.height);
isSigned=false;
}

// SIMPAN FIX
function simpan(){

if(!isSigned){
alert("Tanda tangan wajib diisi!");
return;
}

let data={
nama:nama.value,
rm:rm.value,
wa:formatWA(wa.value),
pemilik:pemilik.value,
tgl:tgl.value,
ttd:canvas.toDataURL(),
status:"belum"
};

db.ref("pasien").push(data);

alert("Tersimpan");
location.reload();
}

// LOGIN
function login(){
let u=prompt("User ID");
let p=prompt("Password");

if(adminList[u] && adminList[u].p==p){
userLogin=adminList[u].n;
admin.classList.remove("hidden");
load();
}else{
alert("Gagal");
}
}

// LOAD
function load(){
db.ref("pasien").on("value",snap=>{
let belumHTML="", sudahHTML="";
let no1=1,no2=1;

snap.forEach(d=>{
let x=d.val();

if(x.status=="belum"){
belumHTML+=`
<tr>
<td>${no1++}</td>
<td>${x.nama}</td>
<td>${x.wa}</td>
<td><button onclick="kirim('${d.key}','${x.nama}','${x.wa}')" class="btn px-2">WA</button></td>
</tr>`;
}else{
sudahHTML+=`
<tr>
<td>${no2++}</td>
<td>${x.nama}</td>
<td>${x.wa}</td>
<td>${x.tgl}</td>
<td>${x.tglKirim}</td>
<td>${x.user}</td>
<td><button onclick="printData('${x.nama}','${x.wa}','${x.tglKirim}')" class="bg-gray-600 text-white px-2 rounded">Print</button></td>
</tr>`;
}
});

belum.innerHTML=belumHTML;
sudah.innerHTML=sudahHTML;

});
}

// KIRIM WA
function kirim(id,nama,wa){
let pesan=`Halo Sahabat MP,

Berikut hasil pemeriksaan ${nama} di Instalasi Radiologi.

Download aplikasi:
https://play.google.com/store/apps/details?id=com.mphg.mp_healthcare`;

window.open(`https://wa.me/${wa}?text=${encodeURIComponent(pesan)}`);

db.ref("pasien/"+id).update({
status:"sudah",
tglKirim:new Date().toLocaleString(),
user:userLogin
});
}

// FORMAT WA
function formatWA(n){
if(n.startsWith("08")) return "62"+n.substring(1);
return n;
}

// FILTER
function filter(){
let t=filterTgl.value;

db.ref("pasien").once("value",snap=>{
let html="";
snap.forEach(d=>{
let x=d.val();
if(x.tgl==t && x.status=="sudah"){
html+=`<tr>
<td>${x.nama}</td>
<td>${x.wa}</td>
<td>${x.tglKirim}</td>
</tr>`;
}
});
sudah.innerHTML=html;
});
}

// EXPORT
function exportExcel(){
db.ref("pasien").once("value",snap=>{
let data="Nama\tWA\tTanggal\n";

snap.forEach(d=>{
let x=d.val();
if(x.status=="sudah"){
data+=`${x.nama}\t${x.wa}\t${x.tglKirim}\n`;
}
});

let blob=new Blob([data]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="laporan.xls";
a.click();
});
}

// PRINT
function printData(nama,wa,tgl){
let w=window.open();
w.document.write(`
<h2>Bukti Kirim WA</h2>
<p>Nama: ${nama}</p>
<p>WA: ${wa}</p>
<p>Tanggal: ${tgl}</p>
`);
w.print();
}

</script>

</body>
</html>
