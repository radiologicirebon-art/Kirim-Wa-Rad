<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiologi Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
background:linear-gradient(135deg,#f4f9fb,#eaf6fb);
font-family:'Segoe UI';
}
.card{
background:#fff;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
.input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #e5e7eb;
}
.btn{
background:#4bb7db;
color:#fff;
padding:12px;
border-radius:10px;
font-weight:600;
}
</style>
</head>

<body class="p-6">

<h1 class="text-2xl font-bold text-center text-[#4bb7db] mb-6">
📊 Dashboard Radiologi WA
</h1>

<!-- FORM -->
<div class="card p-6 max-w-lg mx-auto">
<input id="nama" placeholder="Nama Pasien" class="input">
<input id="rm" placeholder="No RM" class="input">
<input id="wa" placeholder="Nomor WA" class="input">

<p class="text-sm mb-1">Tanda Tangan:</p>
<canvas id="ttd" width="320" height="120" class="border rounded"></canvas>

<button onclick="clearTTD()" class="text-red-500 text-sm mt-2">Clear</button>

<button onclick="simpan()" class="btn w-full mt-4">
Simpan Permohonan
</button>
</div>

<!-- DASHBOARD -->
<div class="card p-6 mt-10 max-w-4xl mx-auto">
<h2 class="font-semibold mb-3">Grafik Kirim Harian</h2>
<canvas id="chart"></canvas>
</div>

<!-- TABLE -->
<div class="mt-10 max-w-4xl mx-auto">

<h2 class="font-semibold text-[#4bb7db] mb-2">Belum Kirim</h2>
<table class="w-full mb-6">
<thead><tr><th>No</th><th>Nama</th><th>RM</th><th>Aksi</th></tr></thead>
<tbody id="belum"></tbody>
</table>

<h2 class="font-semibold text-[#4bb7db] mb-2">Terkirim</h2>
<table class="w-full">
<thead><tr><th>No</th><th>Nama</th><th>RM</th><th>Tanggal</th><th>Cetak</th></tr></thead>
<tbody id="sudah"></tbody>
</table>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

firebase.initializeApp({
databaseURL:"https://kirim-wa-pasien-rad-default-rtdb.asia-southeast1.firebasedatabase.app/"
});
const db=firebase.database();

// CANVAS
let canvas=document.getElementById("ttd");
let ctx=canvas.getContext("2d");
let drawing=false;
let isSigned=false;

canvas.addEventListener("mousedown",(e)=>{
drawing=true; isSigned=true;
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
});
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mousemove",(e)=>{
if(!drawing) return;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
});

function clearTTD(){
ctx.clearRect(0,0,canvas.width,canvas.height);
isSigned=false;
}

// SIMPAN
function simpan(){
if(!isSigned) return alert("TTD wajib");

let data={
nama:nama.value,
rm:rm.value,
wa:formatWA(wa.value),
ttd:canvas.toDataURL(),
status:"belum"
};

db.ref("pasien").push(data);
alert("Tersimpan");
location.reload();
}

// LOAD
let chart;

db.ref("pasien").on("value",snap=>{

let belumHTML="", sudahHTML="";
let no1=1,no2=1;
let statistik={};

snap.forEach(d=>{
let x=d.val();

if(x.status=="belum"){
belumHTML+=`
<tr>
<td>${no1++}</td>
<td>${x.nama}</td>
<td>${x.rm}</td>
<td><button onclick="kirim('${d.key}','${x.nama}','${x.wa}')" class="btn text-sm px-2">Kirim</button></td>
</tr>`;
}else{

// HITUNG DASHBOARD
let tgl=x.tglKirim.split(",")[0];
statistik[tgl]=(statistik[tgl]||0)+1;

sudahHTML+=`
<tr>
<td>${no2++}</td>
<td>${x.nama}</td>
<td>${x.rm}</td>
<td>${x.tglKirim}</td>
<td>
<button onclick="cetakPDF('${x.nama}','${x.rm}','${x.tglKirim}','${x.ttd}')" class="bg-gray-600 text-white px-2 rounded text-sm">
PDF
</button>
</td>
</tr>`;
}
});

belum.innerHTML=belumHTML;
sudah.innerHTML=sudahHTML;

// CHART
let labels=Object.keys(statistik);
let data=Object.values(statistik);

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Jumlah Kirim",
data:data
}]
}
});

});

// KIRIM WA
function kirim(id,nama,wa){

let pesan=`Halo,

Berikut hasil pemeriksaan ${nama} di Instalasi Radiologi.`;

window.open(`https://wa.me/${wa}?text=${encodeURIComponent(pesan)}`);

db.ref("pasien/"+id).update({
status:"sudah",
tglKirim:new Date().toLocaleString()
});
}

// FORMAT WA
function formatWA(n){
if(n.startsWith("08")) return "62"+n.substring(1);
return n;
}

// PDF
async function cetakPDF(nama,rm,tgl,ttd){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFontSize(14);
doc.text("BUKTI PENGIRIMAN HASIL RADIOLOGI",20,20);

doc.setFontSize(12);
doc.text(`Nama Pasien : ${nama}`,20,40);
doc.text(`No RM       : ${rm}`,20,50);
doc.text(`Tanggal     : ${tgl}`,20,60);

doc.text("Tanda Tangan Pasien:",20,80);

// MASUKKAN TTD
doc.addImage(ttd,"PNG",20,85,60,30);

doc.save(`Bukti_${nama}.pdf`);
}

</script>

</body>
</html>
