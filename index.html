<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radiologi WA System • Pro</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GSAP Animasi -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #1e3a8a, #020617);
      color: white;
    }
    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body class="p-4">

  <h1 class="text-3xl font-bold mb-4">💎 Radiologi WA System (Pro)</h1>

  <!-- FORM PASIEN -->
  <div class="glass p-6 rounded-2xl mb-6">
    <h2 class="text-xl mb-3">Input Pasien</h2>
    <div class="grid gap-2">
      <input id="nama" placeholder="Nama" class="p-2 rounded text-black">
      <input id="rm" placeholder="RM" class="p-2 rounded text-black">
      <input id="wa" placeholder="WA" class="p-2 rounded text-black">
      <input id="pemilik" placeholder="Pemilik" class="p-2 rounded text-black">
      <input id="tanggal" type="date" class="p-2 rounded text-black">
      <button onclick="simpan()" class="bg-blue-600 p-2 rounded">Simpan</button>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="loginBox" class="glass p-6 rounded-2xl mb-6">
    <h2 class="text-xl mb-3">Login Admin</h2>
    <input id="user" placeholder="Username" class="p-2 mb-2 w-full text-black rounded">
    <input id="pass" type="password" placeholder="Password" class="p-2 mb-2 w-full text-black rounded">
    <button onclick="login()" class="bg-green-600 p-2 w-full rounded">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">

    <!-- STATS -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="glass p-4 rounded">Total: <span id="total"></span></div>
      <div class="glass p-4 rounded">Belum: <span id="belum"></span></div>
      <div class="glass p-4 rounded">Sudah: <span id="sudah"></span></div>
      <div class="glass p-4 rounded">Hari Ini: <span id="hari"></span></div>
    </div>

    <!-- TABEL -->
    <div class="glass p-4 rounded mb-6">
      <h2 class="mb-2">Belum Kirim</h2>
      <table class="w-full text-sm">
        <tbody id="tbBelum"></tbody>
      </table>
    </div>

    <div class="glass p-4 rounded">
      <h2 class="mb-2">Sudah Kirim</h2>
      <table class="w-full text-sm">
        <tbody id="tbSudah"></tbody>
      </table>
    </div>

  </div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAJgQHOZrXsGfL6eil02qbS4dazhEBm5KM",
  authDomain: "kirim-wa-pasien-rad.firebaseapp.com",
  databaseURL: "https://kirim-wa-pasien-rad-default-rtdb.asia-southeast1.firebasedatabase.app/",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// USER LOGIN
const users = {
  "201708073":"123",
  "202101209":"123",
  "202207105":"123",
  "202303119":"123"
};

let currentUser = "";

function login(){
  if(users[user.value] === pass.value){
    currentUser = user.value;
    loginBox.classList.add("hidden");
    dashboard.classList.remove("hidden");
    load();
    gsap.from("#dashboard",{opacity:0,y:50,duration:1});
  } else alert("Login gagal");
}

function simpan(){
  db.ref("pasien").push({
    nama:nama.value,
    rm:rm.value,
    wa:wa.value,
    pemilik:pemilik.value,
    tanggal:tanggal.value,
    status:"belum"
  });
}

function load(){
  db.ref("pasien").on("value", snap=>{
    tbBelum.innerHTML="";
    tbSudah.innerHTML="";

    let t=0,b=0,s=0,h=0;
    const today = new Date().toISOString().split("T")[0];

    snap.forEach(x=>{
      let d = x.val();
      t++;
      if(d.tanggal===today)h++;

      if(d.status==="belum"){
        b++;
        tbBelum.innerHTML+=row(x.key,d,false);
      } else {
        s++;
        tbSudah.innerHTML+=row(x.key,d,true);
      }
    });

    total.innerText=t;
    belum.innerText=b;
    sudah.innerText=s;
    hari.innerText=h;
  });
}

function row(id,d,done){
  return `<tr class="border-b border-white/10">
    <td>${d.nama}</td>
    <td>${d.wa}</td>
    <td>
      ${!done?`<button onclick="kirim('${id}','${d.wa}','${d.nama}')" class="bg-green-500 px-2 rounded">Kirim</button>`:
      `${d.tglKirim||""}`}
    </td>
  </tr>`;
}

function kirim(id,wa,nama){
  const pesan = `Halo Sahabat MP, Berikut hasil pemeriksaan ${nama}`;

  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(pesan)}`);

  db.ref("pasien/"+id).update({
    status:"sudah",
    tglKirim:new Date().toLocaleString(),
    user:currentUser
  });
}

</script>

</body>
</html>
